steps:
  - label: ":AMD: Build & Test MI210"
    key: "test-mi210"
    command: |
      srun --partition=main \
           --gres=gpu:mi210:4 \
           --time=01:00:00 \
           --nodes=1 \
           --ntasks-per-node=4 \
           --cpus-per-task=8 \
           --container-image=docker://higherordermethods/selfish:latest-x86-rocm643-sm72 \
           --container-mounts=${BUILDKITE_BUILD_CHECKOUT_PATH}:/workspace \
           --container-workdir=/workspace \
           bash -c "cmake -B build -S . && cmake --build build && ctest --test-dir build --output-on-failure"
    agents:
      queue: "galapagos"
      slurm: "true"

  - wait
  
  - label: ":package: Collect Artifacts"
    command: |
      buildkite-agent artifact upload "build/Testing/**/*"
    agents:
      queue: "galapagos"
