steps:
  - label: ":AMD: Build & Test MI210"
    key: "test-mi210"
    command: |
      cmake -B build -S .
      cmake --build build
      ctest --test-dir build --output-on-failure
    agents:
      queue: "galapagos"
      slurm_partition: "main"
      slurm_gres: "gpu:mi210:4"
      slurm_time: "01:00:00"
      slurm_nodes: 1
      slurm_ntasks_per_node: 4
      slurm_cpus_per_task: 8
      slurm_container_image: "docker://higherordermethods/selfish:latest-x86-rocm643-gfx90a"

  - wait
  
  - label: ":package: Collect Artifacts"
    command: |
      buildkite-agent artifact upload "build/Testing/**/*"
    agents:
      queue: "galapagos"
